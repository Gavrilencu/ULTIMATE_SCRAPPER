<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autentificare - Scrapper Ultimate</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-slate-800">Scrapper Ultimate</h1>
      <p class="text-slate-600 mt-1">Autentificare</p>
    </div>
    <div class="bg-white rounded-2xl shadow-xl border border-slate-200 p-8">
      <form method="post" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Utilizator</label>
          <input type="text" name="username" required autofocus
                 class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Parolă</label>
          <input type="password" name="password" required
                 class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
        </div>
        <button type="submit" class="w-full py-3 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 transition">
          Conectare
        </button>
      </form>
    </div>
  </div>
</body>
</html>
